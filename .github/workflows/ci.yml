name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' # only runs on PRs, not pushes
    permissions:
      contents: read
      pull-requests: write # needed to post summary comment on the PR
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate # blocks PRs that introduce moderate+ CVEs
          comment-summary-in-pr: always # posts a summary table on every PR
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause # common permissive licenses
          warn-only: true # unknown licenses warn but never fail the check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.2.0

      - name: Run Biome CI
        run: biome ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    env:
      USGS_URL: ${{ secrets.USGS_URL }}
      FDSN_BASE_URL: ${{ secrets.FDSN_BASE_URL }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run build
        run: bun run build

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: github.ref_name == 'main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write secrets to temp files
        run: |
          echo "${{ secrets.USGS_URL }}" > /tmp/usgs_url
          echo "${{ secrets.FDSN_BASE_URL }}" > /tmp/fdsn_base_url
          echo "${{ secrets.SENTRY_AUTH_TOKEN }}" > /tmp/sentry_auth_token
          echo "${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}" > /tmp/next_public_sentry_dsn

      - name: Build Docker image
        run: |
          docker build \
            --secret id=usgs_url,src=/tmp/usgs_url \
            --secret id=fdsn_base_url,src=/tmp/fdsn_base_url \
            --secret id=sentry_auth_token,src=/tmp/sentry_auth_token \
            --secret id=next_public_sentry_dsn,src=/tmp/next_public_sentry_dsn \
            -t ghcr.io/kenneth-loto/lindol-ph:latest \
            .

      - name: Push image to GHCR
        run: docker push ghcr.io/kenneth-loto/lindol-ph:latest

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [image]
    if: github.ref_name == 'main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
