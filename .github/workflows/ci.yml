name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".gitattributes"
      - ".lintstagedrc.json"
      - ".zed/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' # only runs on PRs, not pushes
    permissions:
      contents: read
      pull-requests: write # needed to post summary comment on the PR
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: moderate # blocks PRs that introduce moderate+ CVEs
          comment-summary-in-pr: always # posts a summary table on every PR
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause # common permissive licenses
          warn-only: true # unknown licenses warn but never fail the check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.2.0

      - name: Run Biome CI
        run: biome ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  image:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, typecheck, test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.ref_name == 'main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref_name == 'main' && github.event_name == 'push' }}
          tags: ghcr.io/kenneth-loto/lindol-ph:latest
          cache-from: type=gha,scope=${{ github.base_ref || github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.base_ref || github.ref_name }}
          secrets: |
            "usgs_url=${{ secrets.USGS_URL }}"
            "fdsn_base_url=${{ secrets.FDSN_BASE_URL }}"
            "sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}"
            "next_public_sentry_dsn=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [image]
    if: github.ref_name == 'main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
